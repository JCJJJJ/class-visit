<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>班级参访统计</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Microsoft YaHei',sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;padding:15px}
.container{max-width:800px;margin:0 auto}
h1{text-align:center;color:#fff;font-size:1.6em;margin-bottom:18px}
.card{background:#fff;border-radius:12px;padding:18px;margin-bottom:12px;box-shadow:0 8px 25px rgba(0,0,0,.15)}
.row{display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.col{flex:1;min-width:140px}
.col label{display:block;font-weight:600;color:#555;margin-bottom:4px;font-size:.85em}
.col input,.col textarea{width:100%;padding:8px 10px;border:2px solid #e0e0e0;border-radius:8px;font-size:.9em}
.col input:focus,.col textarea:focus{outline:none;border-color:#667eea}
.col textarea{resize:vertical;min-height:44px}
.btn{padding:8px 16px;border:none;border-radius:8px;font-size:.88em;cursor:pointer;font-weight:600;display:inline-flex;align-items:center;gap:5px}
.bp{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
.bs{background:linear-gradient(135deg,#11998e,#38ef7d);color:#fff}
.bd{background:linear-gradient(135deg,#eb3349,#f45c43);color:#fff}
.bw{background:linear-gradient(135deg,#f093fb,#f5576c);color:#fff}
.bo{background:#fff;color:#667eea;border:2px solid #667eea}
.bsm{padding:5px 12px;font-size:.8em}
.bg{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.tag{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:3px 10px;border-radius:16px;font-size:.82em}
.tag span{cursor:pointer;font-weight:700;margin-left:4px}
.tip{background:#fff8e1;border-left:4px solid #ffc107;padding:8px 12px;margin:8px 0;font-size:.84em;color:#666}
.ok{background:#e8f5e9;border-left:4px solid #4caf50;padding:8px 12px;margin:8px 0;font-size:.84em;color:#2e7d32}
.ibox{background:#f5f3ff;border-radius:8px;padding:10px;margin-bottom:8px}
.ibox p{margin:2px 0;color:#555;font-size:.86em}
.ibox b{color:#333}
.checks{display:flex;flex-wrap:wrap;gap:8px;margin:6px 0}
.checks label{display:flex;align-items:center;gap:4px;font-size:.86em;color:#555;cursor:pointer}
.checks input{width:16px;height:16px}
table{width:100%;border-collapse:collapse;font-size:.84em;margin-top:8px}
th{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:7px 6px;text-align:center;white-space:nowrap}
td{padding:6px;border-bottom:1px solid #eee;text-align:center}
tr:hover{background:#f5f3ff}
.y{color:#11998e;font-weight:600}
.n{color:#ccc}
.sgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-top:8px}
.sc{background:linear-gradient(135deg,#f5f7fa,#c3cfe2);border-radius:8px;padding:12px;text-align:center}
.sca{background:linear-gradient(135deg,#a8edea,#fed6e3)}
.snum{font-size:1.6em;font-weight:700;color:#333}
.slab{color:#666;font-size:.82em;margin-top:2px}
.empty{text-align:center;color:#aaa;padding:16px}
.sbox{background:#f5f3ff;border:2px dashed #667eea;border-radius:10px;padding:12px;margin-top:8px}
.sbox b{display:block;margin-bottom:4px;font-size:.88em}
.sbox .h{font-size:.78em;color:#888;margin-top:4px}
.larea{width:100%;padding:8px;border:1px solid #ddd;border-radius:8px;font-size:.82em;resize:none;background:#fff;word-break:break-all}
.hide{display:none}
@media print{.btn,.bg,.sbox,.tip{display:none!important}.card{box-shadow:none;border:1px solid #ddd}}
@media(max-width:600px){.row{flex-direction:column}.col{min-width:100%}}
</style>
</head>
<body>
<div class="container">
<h1>📋 班级参访统计</h1>

<div id="pg1">
<div class="card">
<h2 style="color:#333;margin-bottom:12px">📝 创建参访活动</h2>
<div class="row">
<div class="col"><label>日期</label><input type="date" id="iDate"></div>
<div class="col"><label>标题</label><input type="text" id="iTitle" placeholder="如：春季企业参访"></div>
</div>
<div class="col" style="margin-bottom:10px"><label>内容描述</label><textarea id="iContent" placeholder="参访内容..." rows="2"></textarea></div>
<div class="row">
<div class="col"><label>活动项目</label><input type="text" id="iAct" placeholder="如：参观A工厂"></div>
<div style="display:flex;align-items:flex-end"><button class="btn bs bsm" onclick="doAddAct()">➕添加</button></div>
</div>
<div id="actTags" class="tags"></div>
<div id="noAct" style="color:#aaa;font-size:.82em;margin-top:4px">⚠️ 请添加至少一个活动项目</div>
<div class="bg"><button class="btn bp" onclick="doCreate()">🚀 创建活动</button></div>
</div>
</div>

<div id="pg2" class="hide">
<div class="card">
<div class="ibox" id="infoBox"></div>
<div class="sbox">
<b>📤 分享此链接给同学填写：</b>
<textarea id="shareLink" class="larea" rows="2" readonly></textarea>
<div class="bg">
<button class="btn bs" onclick="doCopy('shareLink')">📋 复制链接</button>
</div>
<div class="h">同学打开链接 → 填写 → 提交 → 自动生成新链接发回群里</div>
</div>
</div>
<div class="card">
<h2 style="color:#333;margin-bottom:8px;font-size:1em">📊 统计概览</h2>
<div class="sgrid">
<div class="sc"><div class="snum" id="sT">0</div><div class="slab">登记人数</div></div>
<div class="sc"><div class="snum" id="sC">0</div><div class="slab">参访总人数</div></div>
<div class="sc"><div class="snum" id="sP">0</div><div class="slab">车牌数</div></div>
</div>
<div id="sActs"></div>
</div>
<div class="card"><h2 style="color:#333;margin-bottom:8px;font-size:1em">📋 各活动详情</h2><div id="actDet"><div class="empty">暂无提交</div></div></div>
<div class="card"><h2 style="color:#333;margin-bottom:8px;font-size:1em">🚗 车牌号汇总</h2><div id="plateS"><div class="empty">暂无</div></div></div>
<div class="card">
<h2 style="color:#333;margin-bottom:8px;font-size:1em">📄 完整表格</h2>
<div class="bg" style="margin-top:0;margin-bottom:8px">
<button class="btn bp bsm" onclick="window.print()">🖨️ 打印</button>
<button class="btn bw bsm" onclick="doExport()">📤 导出CSV</button>
</div>
<div style="overflow-x:auto"><table><thead id="tH"></thead><tbody id="tB"></tbody></table></div>
<div id="tE" class="empty">暂无数据</div>
</div>
<div class="card">
<div class="tip">📥 同学填完会把新链接发回群里，你打开最新链接就能看到所有数据。</div>
<div class="bg">
<button class="btn bo bsm" onclick="doFill()">✍️ 我也要填写</button>
<button class="btn bd bsm" onclick="doReset()">🔄 重新创建</button>
</div>
</div>
</div>

<div id="pg3" class="hide">
<div class="card"><div class="ibox" id="fInfo"></div></div>
<div class="card" id="fForm">
<h2 style="color:#333;margin-bottom:10px;font-size:1em">✍️ 填写参访信息</h2>
<div class="row">
<div class="col"><label>姓名</label><input type="text" id="fName" placeholder="你的姓名"></div>
<div class="col"><label>人数</label><input type="number" id="fCnt" min="1" value="1" style="width:80px"></div>
<div class="col"><label>车牌号</label><input type="text" id="fPlate" placeholder="选填"></div>
</div>
<div id="fChecks" class="checks"></div>
<div class="bg"><button class="btn bs" onclick="doSubmit()">✅ 提交</button></div>
</div>
<div class="card" id="fOk" style="display:none">
<div class="ok">✅ 提交成功！请将下方新链接发回群里。</div>
<div class="sbox">
<b>📤 新链接（复制发回群里）：</b>
<textarea id="newLink" class="larea" rows="2" readonly></textarea>
<div class="bg"><button class="btn bs" onclick="doCopy('newLink')">📋 复制链接</button></div>
</div>
</div>
<div class="card" id="fList" style="display:none">
<h2 style="color:#333;margin-bottom:8px;font-size:1em">📋 已登记名单</h2>
<div id="fListContent"></div>
</div>
<div style="text-align:center;margin-top:8px">
<button class="btn bo bsm" onclick="showPg2()">📊 查看统计</button>
</div>
</div>
</div>

<script>
var D = null;
var myActs = [];

function showPg(n) {
    document.getElementById('pg1').style.display = n === 1 ? 'block' : 'none';
    document.getElementById('pg2').style.display = n === 2 ? 'block' : 'none';
    document.getElementById('pg3').style.display = n === 3 ? 'block' : 'none';
}
function showPg1() { showPg(1); }
function showPg2() { if(D) renderAll(); showPg(2); }
function showPg3() { showPg(3); }

function doAddAct() {
    var v = document.getElementById('iAct').value.trim();
    if (!v) return;
    for (var i = 0; i < myActs.length; i++) { if (myActs[i] === v) { alert('已存在'); return; } }
    myActs.push(v);
    document.getElementById('iAct').value = '';
    renderActTags();
}

function rmAct(i) { myActs.splice(i, 1); renderActTags(); }

function renderActTags() {
    var c = document.getElementById('actTags');
    var n = document.getElementById('noAct');
    if (!myActs.length) { c.innerHTML = ''; n.style.display = ''; return; }
    n.style.display = 'none';
    var h = '';
    for (var i = 0; i < myActs.length; i++) {
        h += '<div class="tag">🎯 ' + myActs[i] + ' <span onclick="rmAct(' + i + ')">✕</span></div>';
    }
    c.innerHTML = h;
}

function doCreate() {
    try {
        var d = document.getElementById('iDate').value;
        var t = document.getElementById('iTitle').value.trim();
        var c = document.getElementById('iContent').value.trim();
        if (!d || !t) { alert('请填写日期和标题！'); return; }
        if (!myActs.length) { alert('请至少添加一个活动项目！'); return; }
        D = { d: d, t: t, c: c, a: myActs.slice(), s: [] };
        myActs = [];
        showPg2();
        saveToHash();
    } catch(e) { alert('创建出错: ' + e.message); }
}

function saveToHash() {
    try {
        var json = JSON.stringify(D);
        var encoded = btoa(unescape(encodeURIComponent(json)));
        encoded = encoded.replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
        lastHash = '#' + encoded;
        location.hash = encoded;
    } catch(e) {}
}

function loadFromHash() {
    try {
        var h = location.hash;
        if (!h || h.length < 2) return false;
        var s = h.substring(1);
        s = s.replace(/-/g, '+').replace(/_/g, '/');
        while (s.length % 4) s += '=';
        var decoded = decodeURIComponent(escape(atob(s)));
        var data = JSON.parse(decoded);
        if (data && data.d) { D = data; return true; }
    } catch(e) {}
    return false;
}

function renderAll() {
    if (!D) return;
    var subs = D.s || [];
    var actList = D.a || [];
    var tp = subs.length, tc = 0;
    for (var i = 0; i < subs.length; i++) tc += (subs[i].c || 1);
    var plateObj = {};
    for (var i = 0; i < subs.length; i++) { if (subs[i].p) plateObj[subs[i].p] = 1; }
    var plates = [];
    for (var k in plateObj) plates.push(k);

    // Info box
    var ib = document.getElementById('infoBox');
    ib.innerHTML = '<p><b>📅 日期：</b>' + D.d + '</p><p><b>📌 标题：</b>' + D.t + '</p><p><b>📝 内容：</b>' + (D.c || '无') + '</p><p><b>🎯 活动：</b>' + actList.join('、') + '</p>';

    // Share link
    var baseUrl = location.href.split('#')[0];
    document.getElementById('shareLink').value = baseUrl + '#' + btoa(unescape(encodeURIComponent(JSON.stringify(D)))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');

    // Stats
    document.getElementById('sT').textContent = tp;
    document.getElementById('sC').textContent = tc;
    document.getElementById('sP').textContent = plates.length;

    var ag = document.getElementById('sActs');
    if (actList.length && tp) {
        var sh = '<div class="sgrid">';
        for (var i = 0; i < actList.length; i++) {
            var ps = 0, pc = 0;
            for (var j = 0; j < subs.length; j++) { if (subs[j].a && subs[j].a[i]) { ps++; pc += (subs[j].c || 1); } }
            sh += '<div class="sc sca"><div class="snum">' + ps + '</div><div class="slab">"' + actList[i] + '"</div><div style="font-size:.78em;color:#888">' + pc + '人 | ' + (tp?Math.round(ps/tp*100):0) + '%</div></div>';
        }
        ag.innerHTML = sh + '</div>';
    } else ag.innerHTML = '';

    // Activity detail
    var ad = document.getElementById('actDet');
    if (!tp) { ad.innerHTML = '<div class="empty">暂无提交</div>'; }
    else {
        var h = '';
        for (var ai = 0; ai < actList.length; ai++) {
            var yes = [], no = [];
            for (var j = 0; j < subs.length; j++) { if (subs[j].a && subs[j].a[ai]) yes.push(subs[j]); else no.push(subs[j]); }
            var yc = 0, nc = 0;
            for (var j = 0; j < yes.length; j++) yc += (yes[j].c||1);
            for (var j = 0; j < no.length; j++) nc += (no[j].c||1);
            h += '<h3 style="color:#555;margin:8px 0 4px;font-size:.9em">🎯 ' + actList[ai] + '</h3><div style="display:flex;gap:10px;flex-wrap:wrap">';
            h += '<div style="flex:1;min-width:180px"><p style="color:#11998e;font-size:.82em;font-weight:600">✅ 参加（' + yes.length + '人/' + yc + '人）</p>';
            if (yes.length) { h += '<table><tr><th>姓名</th><th>人数</th><th>车牌</th></tr>'; for(var j=0;j<yes.length;j++) h+='<tr><td>'+yes[j].n+'</td><td>'+(yes[j].c||1)+'</td><td>'+(yes[j].p||'—')+'</td></tr>'; h+='</table>'; }
            else h += '<p style="color:#aaa;font-size:.8em">无</p>';
            h += '</div><div style="flex:1;min-width:180px"><p style="color:#f45c43;font-size:.82em;font-weight:600">❌ 未参加（' + no.length + '人/' + nc + '人）</p>';
            if (no.length) { h += '<table><tr><th>姓名</th><th>人数</th><th>车牌</th></tr>'; for(var j=0;j<no.length;j++) h+='<tr><td>'+no[j].n+'</td><td>'+(no[j].c||1)+'</td><td>'+(no[j].p||'—')+'</td></tr>'; h+='</table>'; }
            else h += '<p style="color:#aaa;font-size:.8em">无</p>';
            h += '</div></div>';
        }
        ad.innerHTML = h;
    }

    // Plates
    var ps2 = document.getElementById('plateS');
    if (plates.length) {
        var ph = '<table><tr><th>序号</th><th>车牌号</th><th>人员</th><th>人数</th></tr>';
        for (var i = 0; i < plates.length; i++) {
            var pp = [], ppc = 0;
            for (var j = 0; j < subs.length; j++) { if (subs[j].p === plates[i]) { pp.push(subs[j].n); ppc += (subs[j].c||1); } }
            ph += '<tr><td>'+(i+1)+'</td><td><b>'+plates[i]+'</b></td><td>'+pp.join('、')+'</td><td>'+ppc+'</td></tr>';
        }
        ps2.innerHTML = ph + '</table>';
    } else ps2.innerHTML = '<div class="empty">暂无</div>';

    // Full table
    var tH = document.getElementById('tH'), tB = document.getElementById('tB'), tE = document.getElementById('tE');
    if (!tp) { tH.innerHTML=''; tB.innerHTML=''; tE.style.display=''; return; }
    tE.style.display = 'none';
    var th = '<tr><th>序号</th><th>姓名</th><th>人数</th><th>车牌号</th>';
    for (var i = 0; i < actList.length; i++) th += '<th>' + actList[i] + '</th>';
    tH.innerHTML = th + '</tr>';
    var tb = '';
    for (var i = 0; i < subs.length; i++) {
        tb += '<tr><td>'+(i+1)+'</td><td>'+subs[i].n+'</td><td>'+(subs[i].c||1)+'</td><td>'+(subs[i].p||'—')+'</td>';
        for (var j = 0; j < actList.length; j++) tb += '<td>'+(subs[i].a&&subs[i].a[j]?'<span class="y">✅</span>':'<span class="n">❌</span>')+'</td>';
        tb += '</tr>';
    }
    tb += '<tr style="background:#f5f3ff;font-weight:600"><td colspan="2">合计</td><td>'+tc+'</td><td>'+plates.length+'辆</td>';
    for (var j = 0; j < actList.length; j++) {
        var y=0,yc=0; for(var i=0;i<subs.length;i++){if(subs[i].a&&subs[i].a[j]){y++;yc+=(subs[i].c||1);}}
        tb += '<td>'+y+'/'+yc+'</td>';
    }
    tB.innerHTML = tb + '</tr>';
}

function doFill() {
    if (!D) return;
    showPg3();
    var actList = D.a || [], subs = D.s || [];
    var h = '<p><b>📅 日期：</b>' + D.d + '</p><p><b>📌 标题：</b>' + D.t + '</p><p><b>📝 内容：</b>' + (D.c||'无') + '</p><p><b>🎯 活动：</b>' + actList.join('、') + '</p><p><b>📊 已登记：</b>' + subs.length + '人</p>';
    document.getElementById('fInfo').innerHTML = h;

    var ch = '';
    for (var i = 0; i < actList.length; i++) ch += '<label><input type="checkbox" id="fa' + i + '" checked> ' + actList[i] + '</label>';
    document.getElementById('fChecks').innerHTML = ch;

    document.getElementById('fForm').style.display = '';
    document.getElementById('fOk').style.display = 'none';
    document.getElementById('fList').style.display = 'none';

    var mn = localStorage.getItem('cvs_name');
    if (mn) document.getElementById('fName').value = mn;
}

function doSubmit() {
    if (!D) return;
    var name = document.getElementById('fName').value.trim();
    var count = parseInt(document.getElementById('fCnt').value) || 1;
    var plate = document.getElementById('fPlate').value.trim();
    if (!name) { alert('请输入姓名！'); return; }

    for (var i = 0; i < D.s.length; i++) { if (D.s[i].n === name) { if(!confirm('"'+name+'" 已登记，覆盖？')) return; D.s.splice(i,1); break; } }

    var actData = [];
    for (var i = 0; i < D.a.length; i++) { var cb = document.getElementById('fa'+i); actData.push(cb ? cb.checked : false); }
    D.s.push({ n: name, c: Math.max(1,count), p: plate, a: actData });
    localStorage.setItem('cvs_name', name);

    var link = location.href.split('#')[0] + '#' + btoa(unescape(encodeURIComponent(JSON.stringify(D)))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
    document.getElementById('newLink').value = link;
    document.getElementById('fOk').style.display = '';
    document.getElementById('fForm').style.display = 'none';

    // Show list
    var subs = D.s, actList = D.a;
    var lh = '<table><tr><th>序号</th><th>姓名</th><th>人数</th><th>车牌</th>';
    for (var i = 0; i < actList.length; i++) lh += '<th>' + actList[i] + '</th>';
    lh += '</tr>';
    for (var i = 0; i < subs.length; i++) {
        lh += '<tr><td>'+(i+1)+'</td><td>'+subs[i].n+'</td><td>'+(subs[i].c||1)+'</td><td>'+(subs[i].p||'—')+'</td>';
        for (var j = 0; j < actList.length; j++) lh += '<td>'+(subs[i].a&&subs[i].a[j]?'<span class="y">✅</span>':'<span class="n">❌</span>')+'</td>';
        lh += '</tr>';
    }
    document.getElementById('fListContent').innerHTML = lh + '</table>';
    document.getElementById('fList').style.display = '';

    saveToHash();
}

function doCopy(id) {
    var el = document.getElementById(id);
    el.select();
    try { document.execCommand('copy'); alert('✅ 已复制！'); } catch(e) { alert('请手动复制'); }
}

function doReset() {
    if (!confirm('确定重新创建？')) return;
    D = null; myActs = []; location.hash = '';
    document.getElementById('iDate').value = '';
    document.getElementById('iTitle').value = '';
    document.getElementById('iContent').value = '';
    renderActTags();
    showPg1();
}

function doExport() {
    if (!D || !D.s.length) { alert('暂无数据'); return; }
    var csv = '\uFEFF';
    csv += '参访日期,'+D.d+'\n参访标题,'+D.t+'\n参访内容,'+D.c+'\n\n';
    csv += '序号,姓名,人数,车牌号,'+D.a.join(',')+'\n';
    for (var i = 0; i < D.s.length; i++) {
        csv += (i+1)+','+D.s[i].n+','+(D.s[i].c||1)+','+(D.s[i].p||'')+',';
        for (var j = 0; j < D.a.length; j++) csv += (D.s[i].a&&D.s[i].a[j]?'是':'否')+',';
        csv += '\n';
    }
    var blob = new Blob([csv],{type:'text/csv;charset=utf-8;'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a'); a.href = url; a.download = '参访统计.csv'; a.click();
}

// Init
try {
    if (loadFromHash()) {
        var myName = localStorage.getItem('cvs_name');
        var found = false;

// Handle back/forward - but don't interfere with programmatic hash changes

window.addEventListener('hashchange', function() {
    if (location.hash === lastHash) return;
    lastHash = location.hash;
    if (loadFromHash()) {
        var myName = localStorage.getItem('cvs_name');
